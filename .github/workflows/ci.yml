name: Rust

on:
  push:
  pull_request:

jobs:
  test-and-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt --check
